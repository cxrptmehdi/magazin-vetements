{% extends 'magazin/base.html' %}
{% block title %}Supprimer — Magazin{% endblock %}

{% block content %}

<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="card p-4 text-center">
      <i class="bi bi-trash" style="font-size:3rem;color:var(--brand-secondary);"></i>
      <h4 class="mt-3 mb-1" style="font-family:var(--font-serif)">Supprimer ce produit ?</h4>
      <p class="text-secondary mb-4">
        Vous êtes sur le point de supprimer <strong>{{ produit.nom }}</strong>.
        Cette action est irréversible.
      </p>
      <form method="post" class="d-flex flex-column gap-2">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger w-100">
          <i class="bi bi-trash me-2"></i>Confirmer la suppression
        </button>
        <a href="{% url 'produits' %}" class="btn btn-outline-brand w-100">
          <i class="bi bi-arrow-left me-2"></i>Annuler
        </a>
      </form>
    </div>
  </div>
</div>

{% endblock %}
