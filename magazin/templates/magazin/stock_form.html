{% extends 'magazin/base.html' %}
{% block title %}Modifier le stock — Magazin{% endblock %}

{% block content %}

<div class="row justify-content-center mt-4">
  <div class="col-md-5">
    <div class="card p-4">
      <div class="text-center mb-4">
        <p class="eyebrow" style="color:var(--brand-primary);font-size:0.7rem;
                                  letter-spacing:0.2em;text-transform:uppercase;">Stock</p>
        <h4 style="font-family:var(--font-serif)">{{ produit.nom }}</h4>
        <span class="badge-brand">{{ produit.categorie.nom_categorie }}</span>
      </div>

      <form method="post">
        {% csrf_token %}
        <div class="mb-4">
          <label class="form-label" style="font-size:0.8rem;font-weight:500">
            Quantité en stock
          </label>
          {{ form.quantite }}
        </div>
        <button type="submit" class="btn btn-brand w-100">
          <i class="bi bi-check-circle me-2"></i>Mettre à jour
        </button>
        <a href="{% url 'stock' %}" class="btn btn-outline-brand w-100 mt-2">
          <i class="bi bi-arrow-left me-2"></i>Retour
        </a>
      </form>
    </div>
  </div>
</div>

{% endblock %}
